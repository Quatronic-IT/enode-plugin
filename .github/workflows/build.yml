name: Verify Cordova plugin build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint plugin.xml / package.json / www
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.xml is well-formed XML
        run: |
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y libxml2-utils >/dev/null
          xmllint --noout plugin.xml
      - name: Validate package.json is well-formed JSON
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
      - name: Syntax-check www/EnodePlugin.js
        run: node --check www/EnodePlugin.js

  android-build:
    name: Android native build (Gradle)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('plugin.xml') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Build scratch app against this plugin
        run: bash scripts/verify-build.sh android

  ios-build:
    name: iOS native build (xcodebuild, simulator)
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('plugin.xml') }}
          restore-keys: |
            pods-${{ runner.os }}-
      - name: Build scratch app against this plugin
        run: bash scripts/verify-build.sh ios
